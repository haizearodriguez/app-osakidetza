<ion-content class="quiz">

  <div class="quiz-wrapper">

    <!-- Top bar: tag + contador -->
    <div class="top-bar">
      <span class="tag">{{ question?.type }}</span>
      <span class="counter"><span>{{ index + 1 }}</span> / {{ totalQuestions }}</span>
    </div>

    <!-- Barra de progreso -->
    <div class="progress-track">
      <div class="progress-fill" [style.width.%]="((index + 1) / totalQuestions) * 100"></div>
    </div>

    <!-- Tarjeta de pregunta -->
    <div class="question-card">
      <div class="q-num">Pregunta {{ question?.id }}</div>
      <div class="q-text">{{ question?.question }}</div>
    </div>

    <!-- Opciones -->
    <div class="options">
      <div
        class="option"
        *ngFor="let opt of ['A','B','C','D']"
        [ngClass]="getButtonClass(opt)"
        (click)="select(opt)">

        <div class="opt-badge">{{ opt }}</div>
        <div class="opt-text">{{ question?.answers[opt] }}</div>

      </div>
    </div>

    <!-- Explicación (visible tras ver respuesta) -->
    <div class="explanation" [ngClass]="{ visible: showAnswer || answered }">
      <div class="exp-label">✓ Respuesta correcta: {{ question?.correct }}</div>
    </div>

    <!-- Acciones -->
    <div class="actions">
      <ion-button class="btn-ver" fill="outline" shape="round"
        [disabled]="answered"
        (click)="verRespuesta()">
        Ver respuesta
      </ion-button>

      <ion-button class="btn-next" shape="round" (click)="next()">
        Siguiente →
      </ion-button>
    </div>

  </div>

</ion-content>
