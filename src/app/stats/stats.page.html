<ion-content class="ion-padding">

  <ion-card class="stats-card">

    <ion-grid>

      <ion-row class="header">
        <ion-col (click)="sort('type')">
          TEMARIO {{ getSortIcon('type') }}
        </ion-col>

        <ion-col (click)="sort('id')">
          PREGUNTA {{ getSortIcon('id') }}
        </ion-col>

        <ion-col (click)="sort('accuracy')">
          PORCENTAJE {{ getSortIcon('accuracy') }}
        </ion-col>

        <ion-col>
          AÑADIR
        </ion-col>
      </ion-row>

      <ion-row *ngFor="let s of stats" class="data-row">

        <ion-col>{{s.type}}</ion-col>
        <ion-col>{{s.id}}</ion-col>
        <ion-col class="accuracy">{{accuracy(s)}}%</ion-col>

        <ion-col>
          <ion-checkbox [(ngModel)]="s.selected" class="custom-checkbox"></ion-checkbox>
        </ion-col>

      </ion-row>

    </ion-grid>

  </ion-card>



  <ion-button expand="block" shape="round" (click)="generateQuiz()">
    Crear Quiz
  </ion-button>

</ion-content>
