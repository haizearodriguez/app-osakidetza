<ion-content class="home">
  <div class="home-wrapper">

    <!-- Header -->
    <div class="header-card">
      <div class="app-badge">OPE Osakidetza 2026</div>
      <div class="title">
        <h1>Auxiliar Administrativo</h1>
        <p>Prepara tu examen con preguntas reales</p>
      </div>
    </div>

    <!-- Botones de temario -->
    <div class="temario">

      <ion-button class="temario-card"
        [routerLink]="['/tabs/quiz']"
        [queryParams]="{ mode: 'general' }"
        shape="round">
        <div class="card-inner">
          <ion-icon name="book-outline" class="card-icon"></ion-icon>
          Temario General
        </div>
      </ion-button>

      <ion-button class="temario-card"
        [routerLink]="['/tabs/quiz']"
        [queryParams]="{ mode: 'specific' }"
        shape="round">
        <div class="card-inner">
          <ion-icon name="medkit-outline" class="card-icon"></ion-icon>
          Temario Específico
        </div>
      </ion-button>

      <ion-button class="temario-card"
        [routerLink]="['/tabs/quiz']"
        [queryParams]="{ mode: 'combined' }"
        shape="round">
        <div class="card-inner">
          <ion-icon name="layers-outline" class="card-icon"></ion-icon>
          Temario Conjunto
        </div>
      </ion-button>

    </div>

  </div>
</ion-content>
